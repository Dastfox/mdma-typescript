name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  id-token: write # required for npm OIDC Trusted Publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22" # npm Trusted Publishing requires npm >=11.5.1 / Node >=22.14.0
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: node --version && npm --version
      - run: npm whoami --registry https://registry.npmjs.org
      - run: npm publish
        # Publishes via npm OIDC Trusted Publishing (configured on npmjs.com for
        # this repo/workflow) — no token needed.
