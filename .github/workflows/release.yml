name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  id-token: write # required for npm OIDC Trusted Publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6 # v6+ required for npm OIDC Trusted Publishing support
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest # bundled npm may be <11.5.1, required for OIDC
      - run: npm ci
      - run: npm run build
      - run: node --version && npm --version
      - run: npm publish
        # Publishes via npm OIDC Trusted Publishing (configured on npmjs.com for
        # this repo/workflow) — no token needed.
